name: Java CI with Gradle

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:  # Manual trigger

jobs:
  build:

    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 8
      uses: actions/setup-java@v4
      with:
        java-version: '8'
        distribution: 'temurin'

    # Cache Gradle dependencies and Forge assets
    - name: Cache Gradle packages
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    # Install Gradle 4.4.1 (required by ForgeGradle 2.1)
    - name: Install Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        wrapper-validation: false
        gradle-version: '4.4.1'
        cache-read-only: false

    # Setup ForgeGradle workspace with retry for asset downloads
    - name: Setup ForgeGradle workspace
      uses: nick-fields/retry@v3
      with:
        timeout_minutes: 30
        max_attempts: 3
        retry_on: error
        command: |
          ./gradlew setupDecompWorkspace --no-daemon --stacktrace

    # Build the project
    - name: Build with Gradle
      run: ./gradlew build --no-daemon --stacktrace

    # Upload all built JARs as artifacts
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: LWJGL3Port-JARs
        path: build/libs/*.jar
        retention-days: 30

  # Skip dependency submission for this legacy project
