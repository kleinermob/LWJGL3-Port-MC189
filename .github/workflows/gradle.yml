name: Java CI with Gradle

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:  # Manual trigger

jobs:
  build:

    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 8
      uses: actions/setup-java@v4
      with:
        java-version: '8'
        distribution: 'temurin'

    # Cache Gradle dependencies
    - name: Cache Gradle packages
      uses: actions/cache@v4
      with:
        path: ~/.gradle
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*') }}

    # Regenerate Gradle wrapper with official version
    - name: Regenerate Gradle wrapper
      shell: powershell
      run: gradlew.bat wrapper --gradle-version 4.4.1

    # Use proper Gradle Actions
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    # Setup ForgeGradle workspace
    - name: Setup ForgeGradle workspace
      run: gradlew.bat setupDecompWorkspace --no-daemon --stacktrace

    # Build the project
    - name: Build with Gradle
      run: gradlew.bat build --no-daemon --stacktrace

    # Upload all built JARs as artifacts
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: LWJGL3Port-JARs
        path: build/libs/*.jar
