name: Java CI with Gradle

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:  # Manual trigger

jobs:
  build:

    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 8
      uses: actions/setup-java@v4
      with:
        java-version: '8'
        distribution: 'temurin'

    # Install Gradle manually to bypass wrapper validation
    - name: Install Gradle
      shell: powershell
      run: |
        Invoke-WebRequest -Uri "https://services.gradle.org/distributions/gradle-4.4.1-bin.zip" -OutFile "gradle.zip"
        Expand-Archive -Path "gradle.zip" -DestinationPath "."
        echo "$PWD\gradle-4.4.1\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

    - name: Setup ForgeGradle workspace
      shell: powershell
      run: |
        # Use system Gradle instead of wrapper to avoid validation
        gradle.bat setupDecompWorkspace --gradle-user-home=$HOME\.gradle

    - name: Build with Gradle
      shell: powershell
      run: |
        # Use system Gradle for build
        gradle.bat build --gradle-user-home=$HOME\.gradle

    # Upload all built JARs as artifacts
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: LWJGL3Port-JARs
        path: build/libs/*.jar
