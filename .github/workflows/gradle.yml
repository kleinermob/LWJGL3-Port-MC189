name: Java CI with Gradle

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:  # Manual trigger

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 8
      uses: actions/setup-java@v4
      with:
        java-version: '8'
        distribution: 'temurin'

    # Install Gradle manually to bypass wrapper validation
    - name: Install Gradle
      run: |
        wget https://services.gradle.org/distributions/gradle-4.4.1-bin.zip
        unzip gradle-4.4.1-bin.zip
        echo "$PWD/gradle-4.4.1/bin" >> $GITHUB_PATH

    - name: Make gradlew executable
      run: chmod +x ./gradlew

    - name: Setup ForgeGradle workspace
      run: |
        # Use system Gradle instead of wrapper to avoid validation
        gradle setupDecompWorkspace --gradle-user-home=$HOME/.gradle

    - name: Build with Gradle
      run: |
        # Use system Gradle for build
        gradle build --gradle-user-home=$HOME/.gradle

    # Upload all built JARs as artifacts
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: LWJGL3Port-JARs
        path: build/libs/*.jar
